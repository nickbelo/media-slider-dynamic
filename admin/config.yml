backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: slides
    label: Slides
    files:
      - file: slides.json
        label: Slides
        name: slides
        format: json
        fields:
          - name: slides
            label: Slides
            widget: list
            fields:
              - {name: type, label: Type, widget: string}