<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dynamic Media Slider</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

.swiper {
  width: 100vw;
  height: 100vh;
}

img, video, iframe {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border: none;
}
</style>
</head>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<body>

<div class="swiper">
  <div class="swiper-wrapper" id="slides"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
function getYoutubeId(url) {
  const match = url.match(/(?:v=|youtu\.be\/)([^&]+)/);
  return match ? match[1] : null;
}

async function loadSlides() {
  const res = await fetch("slides.json");
  const data = await res.json();
  const container = document.getElementById("slides");

  data.slides.forEach(item => {
    const slide = document.createElement("div");
    slide.className = "swiper-slide";
    slide.dataset.duration = item.duration || 5000;

    if (item.type === "image") {
      slide.innerHTML = `<img src="${item.src}">`;
    }

    if (item.type === "video") {
      slide.innerHTML = `
        <video muted>
          <source src="${item.src}" type="video/mp4">
        </video>`;
    }

    if (item.type === "website") {
      slide.innerHTML = `<iframe src="${item.url}"></iframe>`;
    }

    if (item.type === "youtube") {
      const id = getYoutubeId(item.url);
      slide.classList.add("youtube-slide");
      slide.innerHTML = `
        <iframe
          data-src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&rel=0&playsinline=1&enablejsapi=1"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>`;
    }

    container.appendChild(slide);
  });

  startSwiper();
}

function startSwiper() {
  const swiper = new Swiper('.swiper', {
    loop: true,
    allowTouchMove: false,
    autoplay: {
      delay: 5000,
      disableOnInteraction: false
    }
  });

  function resetAllMedia() {
    document.querySelectorAll("video").forEach(v => {
      v.pause();
      v.currentTime = 0;
    });

    document.querySelectorAll(".youtube-slide iframe").forEach(i => {
      i.src = "";
    });
  }

  function activateSlide() {
    const activeSlide = swiper.slides[swiper.activeIndex];

    const duration = activeSlide.dataset.duration || 5000;
    swiper.params.autoplay.delay = duration;
    swiper.autoplay.start();

    resetAllMedia();

    const video = activeSlide.querySelector("video");
    if (video) video.play();

    const youtube = activeSlide.querySelector("iframe[data-src]");
    if (youtube) youtube.src = youtube.dataset.src;
  }

  swiper.on("slideChange", activateSlide);
  activateSlide();
}

loadSlides();
</script>

</body>
</html>
